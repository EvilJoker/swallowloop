<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task #{{ issue_number }} - SwallowLoop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .terminal-output {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .log-line {
            padding: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log-line:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .cursor-blink {
            animation: blink 1s infinite;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
                        accent: { 400: '#a78bfa', 500: '#8b5cf6' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3 hover:opacity-80 transition-opacity">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </div>
                    <span class="text-xl font-bold">SwallowLoop</span>
                </a>
                <a href="/" class="text-slate-400 hover:text-slate-200 transition-colors">
                    ← 返回列表
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 任务信息 -->
        <div id="taskInfo" class="mb-6">
            <div class="glass-card rounded-2xl p-6">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-2">
                            <span id="statusBadge" class="px-3 py-1 rounded-full text-sm font-medium">
                                加载中...
                            </span>
                            <span class="text-slate-400">#{{ issue_number }}</span>
                        </div>
                        <h1 id="taskTitle" class="text-2xl font-bold text-slate-100 mb-2">加载中...</h1>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                    <div>
                        <p class="text-slate-400">分支</p>
                        <p id="branchName" class="text-slate-200 font-mono">-</p>
                    </div>
                    <div>
                        <p class="text-slate-400">类型</p>
                        <p id="taskType" class="text-slate-200">-</p>
                    </div>
                    <div>
                        <p class="text-slate-400">创建时间</p>
                        <p id="createdAt" class="text-slate-200">-</p>
                    </div>
                    <div>
                        <p class="text-slate-400">更新时间</p>
                        <p id="updatedAt" class="text-slate-200">-</p>
                    </div>
                </div>

                <div id="prSection" class="mt-4 pt-4 border-t border-slate-700/50 hidden">
                    <a id="prLink" href="#" target="_blank" class="inline-flex items-center space-x-2 text-primary-400 hover:text-primary-300 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                        <span id="prText">查看 Pull Request</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- 描述 -->
        <div class="glass-card rounded-2xl p-6 mb-6">
            <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                任务描述
            </h2>
            <div id="taskDescription" class="text-slate-300 whitespace-pre-wrap">加载中...</div>
        </div>

        <!-- 实时输出 -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700/50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        实时输出
                    </h2>
                    <span id="connectionStatus" class="flex items-center gap-2 text-sm text-slate-400">
                        <span class="w-2 h-2 rounded-full bg-slate-500"></span>
                        未连接
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleAutoScroll()" id="autoScrollBtn" class="px-3 py-1.5 text-sm rounded-lg bg-primary-500/20 text-primary-300 hover:bg-primary-500/30 transition-colors">
                        自动滚动: 开
                    </button>
                    <button onclick="clearOutput()" class="px-3 py-1.5 text-sm rounded-lg bg-slate-700/50 text-slate-300 hover:bg-slate-700 transition-colors">
                        清空
                    </button>
                </div>
            </div>
            
            <div id="outputContainer" class="h-96 overflow-y-auto bg-slate-950/50 p-4">
                <div id="outputContent" class="terminal-output text-slate-300">
                    <div class="text-slate-500 italic">等待输出...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const issueNumber = {{ issue_number }};
        let autoScroll = true;
        let eventSource = null;
        let taskData = null;

        // 加载任务信息
        async function loadTaskInfo() {
            try {
                const response = await fetch(`/api/tasks/${issueNumber}`);
                if (!response.ok) throw new Error('Task not found');
                taskData = await response.json();
                renderTaskInfo(taskData);
            } catch (e) {
                document.getElementById('taskInfo').innerHTML = `
                    <div class="glass-card rounded-2xl p-6 text-center text-slate-400">
                        <p>任务不存在</p>
                        <a href="/" class="text-primary-400 hover:underline">返回列表</a>
                    </div>
                `;
            }
        }

        function renderTaskInfo(task) {
            const stateConfig = getStateConfig(task.state);
            
            document.getElementById('statusBadge').className = 
                `px-3 py-1 rounded-full text-sm font-medium ${stateConfig.class}`;
            document.getElementById('statusBadge').textContent = stateConfig.text;
            
            document.getElementById('taskTitle').textContent = task.title;
            document.getElementById('branchName').textContent = task.branch_name || '-';
            document.getElementById('taskType').textContent = 
                task.task_type === 'new_task' ? '新任务' : '修改任务';
            document.getElementById('createdAt').textContent = task.created_at;
            document.getElementById('updatedAt').textContent = task.updated_at;
            document.getElementById('taskDescription').textContent = task.description || '无描述';
            
            if (task.pr_number) {
                document.getElementById('prSection').classList.remove('hidden');
                document.getElementById('prLink').href = task.pr_url;
                document.getElementById('prText').textContent = `PR #${task.pr_number}`;
            }
        }

        function getStateConfig(state) {
            const configs = {
                'new': { text: '新建', class: 'bg-slate-500/20 text-slate-300' },
                'assigned': { text: '已分配', class: 'bg-indigo-500/20 text-indigo-300' },
                'pending': { text: '待执行', class: 'bg-yellow-500/20 text-yellow-300' },
                'in_progress': { text: '执行中', class: 'bg-blue-500/20 text-blue-300' },
                'submitted': { text: '已提交', class: 'bg-purple-500/20 text-purple-300' },
                'completed': { text: '已完成', class: 'bg-green-500/20 text-green-300' },
                'aborted': { text: '已中止', class: 'bg-red-500/20 text-red-300' },
            };
            return configs[state] || configs['new'];
        }

        // SSE 连接
        function connectSSE() {
            if (eventSource) {
                eventSource.close();
            }

            const statusEl = document.getElementById('connectionStatus');
            statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> 连接中...';

            eventSource = new EventSource(`/api/tasks/${issueNumber}/output`);

            eventSource.onopen = () => {
                statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> 已连接';
            };

            eventSource.onmessage = (event) => {
                appendOutput(event.data);
            };

            eventSource.onerror = () => {
                statusEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> 连接断开';
                
                // 5秒后重连
                setTimeout(() => {
                    if (taskData && (taskData.state === 'in_progress' || taskData.state === 'pending')) {
                        connectSSE();
                    }
                }, 5000);
            };
        }

        function appendOutput(line) {
            const container = document.getElementById('outputContent');
            
            // 检查是否是占位文本
            if (container.querySelector('.italic')) {
                container.innerHTML = '';
            }

            const lineEl = document.createElement('div');
            lineEl.className = 'log-line';
            
            // 高亮处理
            if (line.includes('[错误]') || line.includes('ERROR') || line.includes('Error')) {
                lineEl.classList.add('text-red-400');
            } else if (line.includes('[警告]') || line.includes('WARN') || line.includes('Warning')) {
                lineEl.classList.add('text-yellow-400');
            } else if (line.includes('[成功]') || line.includes('SUCCESS') || line.includes('Success')) {
                lineEl.classList.add('text-green-400');
            } else if (line.includes('[工具调用]')) {
                lineEl.classList.add('text-primary-400');
            }

            lineEl.textContent = line;
            container.appendChild(lineEl);

            if (autoScroll) {
                const scrollContainer = document.getElementById('outputContainer');
                scrollContainer.scrollTop = scrollContainer.scrollHeight;
            }
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            const btn = document.getElementById('autoScrollBtn');
            btn.textContent = `自动滚动: ${autoScroll ? '开' : '关'}`;
            btn.classList.toggle('bg-primary-500/20', autoScroll);
            btn.classList.toggle('bg-slate-700/50', !autoScroll);
        }

        function clearOutput() {
            document.getElementById('outputContent').innerHTML = 
                '<div class="text-slate-500 italic">输出已清空</div>';
        }

        // 定期刷新任务信息
        async function refreshTaskInfo() {
            try {
                const response = await fetch(`/api/tasks/${issueNumber}`);
                if (response.ok) {
                    taskData = await response.json();
                    renderTaskInfo(taskData);
                    
                    // 如果任务已完成，关闭 SSE 连接
                    if (taskData.state !== 'in_progress' && taskData.state !== 'pending') {
                        if (eventSource) {
                            eventSource.close();
                            document.getElementById('connectionStatus').innerHTML = 
                                '<span class="w-2 h-2 rounded-full bg-slate-500"></span> 任务已结束';
                        }
                    }
                }
            } catch (e) {
                console.error('刷新任务信息失败:', e);
            }
        }

        // 初始化
        loadTaskInfo().then(() => {
            connectSSE();
            // 每 10 秒刷新任务信息
            setInterval(refreshTaskInfo, 10000);
        });
    </script>
</body>
</html>
