# DeerFlow Development Environment (数据外置版)
# Usage: docker compose -f docker-compose-dev.yaml up
#
# 数据目录: ~/.deer-flow/
#   - config.yaml          # 主配置
#   - extensions_config.json # MCP/Skills 配置
#   - skills/              # Agent 技能目录
#   - logs/                # 日志目录
#   - .deer-flow/          # Checkpoints 数据库
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - langgraph: LangGraph server (port 2024)
#
# Access: http://localhost:2026

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "2026:2026"
    volumes:
      - ${HOME}/.deer-flow/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # Frontend - Next.js Production Server
  frontend:
    image: ghcr.io/eviljoker/deer-flow-frontend:latest
    container_name: deer-flow-frontend
    command: sh -c "cd frontend && node node_modules/next/dist/bin/next start -p 3000 > /app/logs/frontend.log 2>&1"
    volumes:
      - ${HOME}/.deer-flow/logs:/app/logs
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-default_secret_for_dev}
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    image: ghcr.io/eviljoker/deer-flow:latest
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 > /app/logs/gateway.log 2>&1"
    security_opt:
      - seccomp=unconfined
    volumes:
      - ${HOME}/.deer-flow/config.yaml:/app/config.yaml
      - ${HOME}/.deer-flow/extensions_config.json:/app/extensions_config.json
      - ${HOME}/.deer-flow/skills:/app/skills
      - ${HOME}/.deer-flow/logs:/app/logs
      # Checkpoints 数据库持久化
      - ${HOME}/.deer-flow/.deer-flow:/app/backend/.deer-flow
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
      # DooD: AioSandboxProvider runs inside LangGraph process.
      - /var/run/docker.sock:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOST_BASE_DIR=${HOME}/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${HOME}/.deer-flow/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ${HOME}/.deer-flow/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    image: ghcr.io/eviljoker/deer-flow:latest
    container_name: deer-flow-langgraph
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024 > /app/logs/langgraph.log 2>&1"
    security_opt:
      - seccomp=unconfined
    volumes:
      - ${HOME}/.deer-flow/config.yaml:/app/config.yaml
      - ${HOME}/.deer-flow/extensions_config.json:/app/extensions_config.json
      - ${HOME}/.deer-flow/skills:/app/skills
      - ${HOME}/.deer-flow/logs:/app/logs
      # Checkpoints 数据库持久化
      - ${HOME}/.deer-flow/.deer-flow:/app/backend/.deer-flow
      # Mount uv cache for faster dependency installation
      - ~/.cache/uv:/root/.cache/uv
      # DooD: AioSandboxProvider runs inside LangGraph process.
      - /var/run/docker.sock:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOST_BASE_DIR=${HOME}/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${HOME}/.deer-flow/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ${HOME}/.deer-flow/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

networks:
  deer-flow-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
